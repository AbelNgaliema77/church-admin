services:
  - type: web
    name: church-admin-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Auth__JwtKey
        generateValue: true
      - key: Auth__Issuer
        value: ChurchAdmin.Api
      - key: Auth__Audience
        value: ChurchAdmin.App
      - key: Auth__ExpiryMinutes
        value: "480"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: Frontend__BaseUrl
        sync: false
      - key: Frontend__ProductName
        value: Church Admin
      - key: RUN_MIGRATIONS
        value: "true"
      - key: EmailSettings__Host
        sync: false
      - key: EmailSettings__Port
        value: "587"
      - key: EmailSettings__Username
        sync: false
      - key: EmailSettings__Password
        sync: false
      - key: EmailSettings__FromEmail
        sync: false
      - key: EmailSettings__FromName
        value: Church Admin
